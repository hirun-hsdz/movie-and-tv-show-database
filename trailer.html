<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie & TV Show Database</title>
</head>
<body>

    <center>
        <h1>🎬 Movie & TV Show Database</h1>

        <h2>Featured Trailer</h2>

        <iframe
            width="800"
            height="450"
            src="https://www.youtube.com/embed/TcMBFSGVi1c"

            frameborder="0"
            allowfullscreen>

        <table border="1" cellpadding="10">
            <tr>
                <th>Poster</th>
                <th>Title</th>

            <tr>
                <td>
                    <img src="download.jpeg"
                         alt="Poster">
                </td>
                <td>Avengers: Endgame</td>

            </tr>

            <tr>
                <td>
                    <img src="Stranger Things"
                         alt="Poster">
                </td>
                <td>Stranger Things</td>
                <td>TV Show</td>
                <td>2016</td>
            </tr>
        </table>

        <br>

       
    </center>
